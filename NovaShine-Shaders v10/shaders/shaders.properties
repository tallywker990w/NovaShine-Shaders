## NovaShine Shaders - config
## Iris / OptiFine format shaderpack

## Let our own shader code fully control ambient occlusion / lighting
shadow.ambientOcclusionLevel=0.0

## ---------------------------------------------------------------------
## QUALITY PROFILES
## In-game: Options > Video Settings > Shaderpack Settings > Profile
## Or edit "profile=" below directly and restart/reload the shaderpack.
##
## Note: shadowMapResolution and shadowDistance are declared as options
## in shaders/shadow.vsh and shaders/gbuffers_terrain.fsh (must match
## identically in both, per Iris/OptiFine option rules) rather than here,
## since those two are special engine-recognized constant names.
## ---------------------------------------------------------------------

sliders=shadowMapResolution shadowDistance SHADOW_SAMPLES GOD_RAY_SAMPLES BLOOM_QUALITY WAVING_PLANTS PUDDLES CONTACT_SHADOWS

screen=<profile> shadowMapResolution shadowDistance SHADOW_SAMPLES GOD_RAY_SAMPLES BLOOM_QUALITY WAVING_PLANTS PUDDLES CONTACT_SHADOWS

profile.POTATO=shadowMapResolution=512 shadowDistance=50.0 SHADOW_SAMPLES=0 GOD_RAY_SAMPLES=0 BLOOM_QUALITY=0 WAVING_PLANTS=0 PUDDLES=0 CONTACT_SHADOWS=0
profile.LOW=shadowMapResolution=1024 shadowDistance=75.0 SHADOW_SAMPLES=1 GOD_RAY_SAMPLES=16 BLOOM_QUALITY=1 WAVING_PLANTS=1 PUDDLES=0 CONTACT_SHADOWS=0
profile.MEDIUM=shadowMapResolution=2048 shadowDistance=100.0 SHADOW_SAMPLES=2 GOD_RAY_SAMPLES=24 BLOOM_QUALITY=2 WAVING_PLANTS=1 PUDDLES=1 CONTACT_SHADOWS=1
profile.HIGH=shadowMapResolution=2048 shadowDistance=100.0 SHADOW_SAMPLES=2 GOD_RAY_SAMPLES=40 BLOOM_QUALITY=2 WAVING_PLANTS=1 PUDDLES=1 CONTACT_SHADOWS=1
profile.ULTRA=shadowMapResolution=4096 shadowDistance=140.0 SHADOW_SAMPLES=3 GOD_RAY_SAMPLES=64 BLOOM_QUALITY=3 WAVING_PLANTS=1 PUDDLES=1 CONTACT_SHADOWS=1

## HIGH is the default profile, per request.
profile=HIGH
