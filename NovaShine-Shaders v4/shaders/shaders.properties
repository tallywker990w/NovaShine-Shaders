## NovaShine Shaders - config
## Iris / OptiFine format shaderpack

# Shadow map resolution (higher = sharper shadows, more GPU cost)
shadowMapResolution=2048

# Let our own shader code fully control ambient occlusion / lighting
shadow.ambientOcclusionLevel=0.0

# How far shadows render, in blocks. Kept tighter than default so the
# 2048 shadow map texels cover less world space each = sharper shadows
# and less acne, at the cost of shadows fading out a bit sooner at range.
shadowDistance=100.0
