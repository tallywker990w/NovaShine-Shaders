## NovaShine Shaders - block ID mapping
## Assigns mc_Entity.x IDs so the vertex shader can tell which blocks
## should sway in the wind. Add more block names to these lists if you
## want other blocks to sway too.

# Grass, ferns, flowers, crops - full wind sway
block.10001=minecraft:short_grass minecraft:tall_grass minecraft:fern minecraft:large_fern \
  minecraft:dandelion minecraft:poppy minecraft:blue_orchid minecraft:allium \
  minecraft:azure_bluet minecraft:red_tulip minecraft:orange_tulip minecraft:white_tulip \
  minecraft:pink_tulip minecraft:oxeye_daisy minecraft:cornflower minecraft:lily_of_the_valley \
  minecraft:torchflower minecraft:wither_rose minecraft:sunflower minecraft:lilac \
  minecraft:rose_bush minecraft:peony minecraft:wheat minecraft:carrots minecraft:potatoes \
  minecraft:beetroots minecraft:sweet_berry_bush minecraft:sugar_cane minecraft:vine \
  minecraft:weeping_vines minecraft:weeping_vines_plant minecraft:twisting_vines \
  minecraft:twisting_vines_plant minecraft:pink_petals minecraft:bush minecraft:seagrass

# Leaves - much smaller sway amplitude (handled separately in the shader)
block.10002=minecraft:oak_leaves minecraft:birch_leaves minecraft:spruce_leaves \
  minecraft:jungle_leaves minecraft:acacia_leaves minecraft:dark_oak_leaves \
  minecraft:mangrove_leaves minecraft:cherry_leaves minecraft:azalea_leaves \
  minecraft:flowering_azalea_leaves
